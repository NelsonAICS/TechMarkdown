name: TechMarkdown
options:
  bundleIdPrefix: com.example
  developmentLanguage: zh-Hans
  localizations:
    - zh-Hans
  deploymentTarget:
    macOS: "14.0"

targets:
  TechMarkdown:
    type: application
    platform: macOS
    sources:
      - path: TechMarkdown
    settings:
      INFOPLIST_FILE: TechMarkdown/Info.plist
      PRODUCT_BUNDLE_IDENTIFIER: com.example.TechMarkdown
      MARKETING_VERSION: "1.1.0"
      CURRENT_PROJECT_VERSION: "2"
      GENERATE_INFOPLIST_FILE: NO
      SWIFT_VERSION: "5.10"
      MACOSX_DEPLOYMENT_TARGET: "14.0"
      CODE_SIGN_ENTITLEMENTS: TechMarkdown/TechMarkdown.entitlements
      SWIFT_EMIT_LOC_STRINGS: NO

  TechMarkdownTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/TechMarkdownTests
    dependencies:
      - target: TechMarkdown
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.example.TechMarkdownTests
      SWIFT_VERSION: "5.10"
      MACOSX_DEPLOYMENT_TARGET: "14.0"
      TEST_HOST: "$(BUILT_PRODUCTS_DIR)/TechMarkdown.app/Contents/MacOS/TechMarkdown"
      BUNDLE_LOADER: "$(TEST_HOST)"
